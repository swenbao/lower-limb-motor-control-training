name: Build and deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-primary.outputs.page_url != '' && steps.deploy-primary.outputs.page_url || steps.deploy-retry.outputs.page_url != '' && steps.deploy-retry.outputs.page_url || 'https://swenbao.github.io/lower-limb-motor-control-training/' }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy-primary
        continue-on-error: true
        uses: actions/deploy-pages@v5
      - name: Retry deploy to GitHub Pages
        id: deploy-retry
        if: steps.deploy-primary.outcome == 'failure'
        uses: actions/deploy-pages@v5
      - name: Fail if both deploy attempts fail
        if: always() && steps.deploy-primary.outcome != 'success' && (steps.deploy-retry.outcome == 'skipped' || steps.deploy-retry.outcome == 'failure' || steps.deploy-retry.outcome == 'cancelled')
        run: exit 1
